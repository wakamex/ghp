name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: unit
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: build
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install build
          python -m build
      - name: uv tool smoke
        env:
          HOME: ${{ runner.temp }}/home-dist
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        run: |
          mkdir -p "$HOME"
          uv tool install --force --no-index --find-links dist ghp
          "$HOME/.local/bin/ghp" --help
      - name: uv tool local smoke
        env:
          HOME: ${{ runner.temp }}/home-local
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache-local
        run: |
          mkdir -p "$HOME"
          uv tool install --force -e .
          "$HOME/.local/bin/ghp" --help
