name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/ghp
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v5
      - name: wait for pypi
        env:
          HOME: ${{ runner.temp }}/home-wait
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache-wait
        run: |
          expected="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME"
          got=""
          for i in $(seq 1 15); do
            got="$(uvx ghp --version 2>/dev/null || true)"
            echo "attempt=$i got=${got:-<no output>}"
            if [ "$got" = "ghp $expected" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "expected ghp $expected, got: ${got:-<no output>}" >&2
          exit 1
      - name: verify pypi install
        env:
          HOME: ${{ runner.temp }}/home
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        run: |
          expected="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME"
          uv tool install --force ghp
          test "$("$HOME/.local/bin/ghp" --version)" = "ghp $expected"
      - name: verify uvx
        env:
          HOME: ${{ runner.temp }}/home-uvx
          UV_CACHE_DIR: ${{ runner.temp }}/uvx-cache
        run: |
          expected="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME"
          test "$(uvx ghp --version)" = "ghp $expected"
